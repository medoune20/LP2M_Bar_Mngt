name: Deploy - GestionBarRestaurant

# Déploiement automatique sur le serveur distant à chaque push sur main
# ou manuellement via "Run workflow".
#
# Le job ne tente plus une connexion SSH si les secrets obligatoires sont absents.
# Cela évite les échecs immédiats du type : "missing server host".
#
# SECRETS à définir dans GitHub (Settings → Secrets and variables → Actions) :
#   DEPLOY_HOST     IP ou domaine du serveur            (ex. lp2medoune.com)
#   DEPLOY_USER     utilisateur SSH                      (ex. root)
#   DEPLOY_SSH_KEY  clé privée SSH (contenu complet)
#   DEPLOY_PORT     port SSH (optionnel, défaut 22)
#   DEPLOY_PATH     chemin du clone sur le serveur       (optionnel, défaut /opt/lp2m)

on:
  push:
    branches: [main]
    paths:
      - 'GestionBarRestaurant/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Vérifier les secrets de déploiement
        id: preflight
        shell: bash
        run: |
          missing=0
          if [ -z "$DEPLOY_HOST" ]; then echo "::warning::Secret DEPLOY_HOST manquant."; missing=1; fi
          if [ -z "$DEPLOY_USER" ]; then echo "::warning::Secret DEPLOY_USER manquant."; missing=1; fi
          if [ -z "$DEPLOY_SSH_KEY" ]; then echo "::warning::Secret DEPLOY_SSH_KEY manquant."; missing=1; fi

          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Déploiement ignoré : renseigner DEPLOY_HOST, DEPLOY_USER et DEPLOY_SSH_KEY dans GitHub Actions secrets."
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Déployer via SSH (git pull + docker compose)
        if: steps.preflight.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/lp2m}"
            echo "Déploiement dans $DEPLOY_PATH"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Dépôt Git absent dans $DEPLOY_PATH. Clone initial requis : git clone https://github.com/medoune20/LP2M_Bar_Mngt.git $DEPLOY_PATH"
              exit 1
            fi

            cd "$DEPLOY_PATH"
            git fetch --all --prune
            git reset --hard origin/main
            cd GestionBarRestaurant

            if docker compose version >/dev/null 2>&1; then
              docker compose up -d --build
            else
              docker-compose up -d --build
            fi

            docker image prune -f
            echo "Déploiement terminé."
