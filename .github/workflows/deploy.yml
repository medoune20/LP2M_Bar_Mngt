name: Deploy - GestionBarRestaurant

# Déploiement automatique sur le serveur distant à chaque push sur main
# (ou manuellement via "Run workflow").
#
# PRÉREQUIS sur le serveur (une seule fois) :
#   git clone https://github.com/medoune20/LP2M_Bar_Mngt.git /opt/lp2m
#   (Docker + plugin compose installés)
#
# SECRETS à définir dans GitHub (Settings → Secrets and variables → Actions) :
#   DEPLOY_HOST     IP ou domaine du serveur            (ex. 51.x.x.x)
#   DEPLOY_USER     utilisateur SSH                      (ex. root)
#   DEPLOY_SSH_KEY  clé privée SSH (contenu complet)
#   DEPLOY_PORT     port SSH (optionnel, défaut 22)
#   DEPLOY_PATH     chemin du clone sur le serveur       (optionnel, défaut /opt/lp2m)

on:
  push:
    branches: [main]
    paths:
      - 'GestionBarRestaurant/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Déployer via SSH (git pull + docker compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/lp2m}"
            echo "Déploiement dans $DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            git fetch --all --prune
            git reset --hard origin/main
            cd GestionBarRestaurant
            docker compose up -d --build
            docker image prune -f
            echo "Déploiement terminé."
