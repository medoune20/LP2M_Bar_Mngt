services:
  app:
    build: .
    container_name: gestionbar-app
    restart: unless-stopped
    environment:
      - DATA_DIR=/app/Data
      - ASPNETCORE_ENVIRONMENT=Production
      # Sous-dossier d'hebergement : l'app vit sous lp2medoune.com/gestionbar
      - PATH_BASE=/gestionbar
      # Email (mot de passe oublié, confirmation d'inscription). Les valeurs
      # proviennent du fichier .env (non versionné). Voir .env.example.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_SSL=${SMTP_SSL:-true}
    volumes:
      # La base SQLite et les sauvegardes survivent aux mises à jour du conteneur
      - ./data:/app/Data
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    container_name: gestionbar-caddy
    restart: unless-stopped
    # Permet à Caddy, qui tourne dans Docker, de joindre les applications exposees sur l'hote
    # comme LP2M Gestion Hopital sur host.docker.internal:5050.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
